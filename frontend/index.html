<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>2048</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <h1>2048</h1>

  <div class="top-bar">
    <div class="score-box">Score: <span id="score">0</span></div>
    <button onclick="startNewGame()">New Game</button>
    <button onclick="askForHint()">AI Hint</button>
  </div>

  <div id="grid"></div>

  <div id="message"></div>
  <div id="hint-msg"></div>

  <p>Arrow keys to move | H = hint | N = new game</p>

  <script src="/static/game.js"></script>
</body>
</html>
